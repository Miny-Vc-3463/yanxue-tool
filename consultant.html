<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no,viewport-fit=cover">
<title>咨询师数据后台</title>
<meta name="description" content="厌学评估工具数据管理后台">
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;font-family:-apple-system,BlinkMacSystemFont,"PingFang SC",sans-serif;background:#f5f6fa;color:#333}
body{overflow-x:hidden}
.lock-overlay{position:fixed;top:0;left:0;right:0;bottom:0;background:linear-gradient(135deg,#667eea,#764ba2);display:flex;align-items:center;justify-content:center;z-index:999999}
.lock-overlay.hide{display:none}
.lock-box{background:#fff;border-radius:20px;padding:36px 32px;width:340px;max-width:90vw;text-align:center;box-shadow:0 20px 60px rgba(0,0,0,0.3)}
.lock-box h2{font-size:18px;color:#333;margin-bottom:6px}
.lock-box p{font-size:12px;color:#999;margin-bottom:20px}
.lock-box input{width:100%;padding:12px;border:2px solid #e0e0e0;border-radius:10px;font-size:14px;margin-bottom:14px;outline:none}
.lock-box input:focus{border-color:#667eea}
.lock-box .btn{width:100%;padding:12px;background:linear-gradient(135deg,#667eea,#764ba2);color:#fff;border:none;border-radius:10px;font-size:14px;font-weight:600;cursor:pointer}
.lock-box .error{display:none;color:#e74c3c;font-size:12px;margin-top:10px}
.header{background:linear-gradient(135deg,#667eea,#764ba2);color:#fff;padding:20px;text-align:center;display:none}
.header h1{font-size:18px;margin:0}
.container{max-width:800px;margin:0 auto;padding:20px;display:none}
.form-section{background:#fff;border-radius:12px;padding:16px;margin-bottom:14px;box-shadow:0 2px 8px rgba(0,0,0,0.08)}
.info-box{background:#f0f4ff;border-left:4px solid #667eea;padding:12px;border-radius:0 8px 8px 0;font-size:12px;line-height:1.6;color:#555}
.stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(100px,1fr));gap:12px;margin-bottom:14px}
.stat-card{background:#fff;border-radius:12px;padding:16px;text-align:center;box-shadow:0 2px 8px rgba(0,0,0,0.08)}
.stat-card .num{font-size:24px;font-weight:bold;color:#667eea;margin-bottom:4px}
.stat-card .label{font-size:12px;color:#999}
.btn-row{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:14px}
.btn2{flex:1;min-width:80px;padding:10px;background:#667eea;color:#fff;border:none;border-radius:8px;font-size:13px;font-weight:600;cursor:pointer;transition:all .2s}
.btn2:hover{transform:translateY(-2px);box-shadow:0 4px 12px rgba(102,126,234,0.4)}
.btn2.green{background:#27ae60}
.btn2.green:hover{box-shadow:0 4px 12px rgba(39,174,96,0.4)}
.btn2.red{background:#e74c3c}
.btn2.red:hover{box-shadow:0 4px 12px rgba(231,76,60,0.4)}
.filter-bar{display:flex;gap:8px;overflow-x:auto;padding-bottom:8px;margin-bottom:14px}
.filter-btn{padding:8px 14px;background:#e0e0e0;border:none;border-radius:20px;font-size:12px;cursor:pointer;white-space:nowrap;transition:all .2s}
.filter-btn.active{background:#667eea;color:#fff}
.record-card{background:#fff;border-radius:12px;padding:14px;margin-bottom:10px;border-left:4px solid #667eea;box-shadow:0 2px 8px rgba(0,0,0,0.08)}
.record-card.high{border-left-color:#e74c3c}
.record-card.medium{border-left-color:#f39c12}
.record-card.low{border-left-color:#27ae60}
.record-header{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:10px}
.record-name{font-weight:600;font-size:14px;color:#333}
.record-phone{font-size:12px;color:#999;margin-top:2px}
.record-meta{display:flex;gap:8px;flex-wrap:wrap;font-size:11px;color:#999}
.record-time{color:#999}
.record-tool{padding:2px 8px;border-radius:4px;font-size:11px;font-weight:600;color:#fff}
.record-tool.t1{background:#667eea}
.record-tool.t2{background:#27ae60}
.record-tool.t3{background:#f39c12}
.record-tool.t4{background:#764ba2}
.record-scores{display:flex;gap:6px;flex-wrap:wrap;margin:8px 0;font-size:11px}
.score-tag{padding:3px 8px;border-radius:4px;background:#f0f4ff;color:#667eea}
.score-tag.s1{background:#fde8e8;color:#e74c3c}
.score-tag.s2{background:#fef9f0;color:#f39c12}
.score-tag.s3{background:#e8f8f5;color:#27ae60}
.record-note{font-size:12px;color:#666;background:#f9f9f9;padding:8px;border-radius:6px;margin:8px 0}
.record-actions{display:flex;gap:8px;margin-top:10px}
.btn-sm{flex:1;padding:8px;background:#667eea;color:#fff;border:none;border-radius:6px;font-size:12px;cursor:pointer}
.btn-sm.red{background:#e74c3c}
.empty-state{text-align:center;padding:40px 20px;color:#999}
.empty-state .icon{font-size:48px;margin-bottom:10px}
.modal-overlay{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.5);display:none;align-items:center;justify-content:center;z-index:9999;padding:20px}
.modal-overlay.show{display:flex}
.modal-box{background:#fff;border-radius:12px;width:100%;max-width:500px;max-height:80vh;overflow-y:auto;box-shadow:0 20px 60px rgba(0,0,0,0.3)}
.modal-header{background:linear-gradient(135deg,#667eea,#764ba2);color:#fff;padding:16px;border-radius:12px 12px 0 0;display:flex;justify-content:space-between;align-items:center}
.modal-header h3{font-size:16px;margin:0}
.modal-close{background:none;border:none;color:#fff;font-size:24px;cursor:pointer;opacity:0.7}
.modal-close:hover{opacity:1}
.modal-body{padding:16px}
.modal-section{margin-bottom:16px}
.modal-section h4{font-size:13px;color:#333;margin-bottom:10px;font-weight:600}
.modal-row{display:flex;justify-content:space-between;padding:8px 0;border-bottom:1px solid #eee;font-size:13px}
.modal-row:last-child{border-bottom:none}
.modal-row .lbl{color:#999;font-weight:600}
.modal-row .val{color:#333;font-weight:600}
.modal-row .val.high{color:#e74c3c}
.modal-row .val.medium{color:#f39c12}
.modal-row .val.low{color:#27ae60}
@media(max-width:600px){.stats{grid-template-columns:repeat(2,1fr)}.btn-row{flex-direction:column}.btn2{width:100%}.filter-bar{gap:6px}.record-card{padding:12px}.record-header{flex-direction:column}}
</style>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
</head>
<body>

<div class="lock-overlay" id="lockOverlay">
<div class="lock-box">
<div style="font-size:48px;margin-bottom:12px">🔐</div>
<h2>咨询师后台</h2>
<p>请输入访问密码</p>
<input type="password" id="lockInput" placeholder="请输入密码" maxlength="20">
<button class="btn" onclick="checkPassword()">进入后台</button>
<div class="error" id="lockError">密码错误，请重试</div>
</div>
</div>

<div class="header" id="mainHeader">
<h1>🔐 咨询师数据后台</h1>
</div>

<div class="container" id="mainContainer">

<div class="form-section">
<div class="info-box">
<p>✅ <strong>自动接收：</strong>四个评估工具的提交数据会自动显示在此页面</p>
<p style="margin-top:8px">📱 <strong>手机访问：</strong>支持手机访问</p>
<p style="margin-top:8px">⚠️ <strong>数据存储：</strong>数据存在浏览器本地，清除缓存会删除</p>
</div>
</div>

<div class="stats">
<div class="stat-card"><div class="num" id="statTotal">0</div><div class="label">总记录</div></div>
<div class="stat-card"><div class="num" id="statHigh">0</div><div class="label">高风险</div></div>
<div class="stat-card"><div class="num" id="statMedium">0</div><div class="label">中风险</div></div>
<div class="stat-card"><div class="num" id="statToday">0</div><div class="label">今日新增</div></div>
</div>

<div class="form-section">
<div class="btn-row">
<button class="btn2" onclick="loadRecords()">🔄 刷新</button>
<button class="btn2 green" onclick="exportExcel()">📊 导出Excel</button>
<button class="btn2 red" onclick="clearAll()">🗑️ 清空</button>
</div>
<div class="filter-bar" id="filterBar">
<div class="filter-btn active" onclick="setFilter('all')">全部</div>
<div class="filter-btn" onclick="setFilter('yanxue')">厌学成因</div>
<div class="filter-btn" onclick="setFilter('parent')">家长心态</div>
<div class="filter-btn" onclick="setFilter('teen')">厌学程度</div>
<div class="filter-btn" onclick="setFilter('family')">家庭互动</div>
</div>
</div>

<div class="form-section">
<h3 style="font-size:15px;color:#333;margin-bottom:14px">📋 评估记录</h3>
<div id="recordList">
<div class="empty-state">
<div class="icon">📭</div>
<p>暂无评估记录</p>
</div>
</div>
</div>

</div>

<div class="modal-overlay" id="detailModal">
<div class="modal-box">
<div class="modal-header">
<h3>📊 评估详情</h3>
<button class="modal-close" onclick="closeDetail()">×</button>
</div>
<div class="modal-body" id="detailContent"></div>
</div>
</div>

<script>
(function(){
var STORAGE_KEY='yanxue_records';
var PWD_KEY='yanxue_consultant_pwd';
var DEFAULT_PWD='yanxue2024';
var records=[];
var currentFilter='all';

function checkPassword(){
var input=document.getElementById('lockInput').value.trim();
var storedPwd=localStorage.getItem(PWD_KEY)||DEFAULT_PWD;
if(input===storedPwd){
document.getElementById('lockOverlay').classList.add('hide');
document.getElementById('mainHeader').style.display='block';
document.getElementById('mainContainer').style.display='block';
loadRecords();
}else{
document.getElementById('lockError').style.display='block';
document.getElementById('lockInput').value='';
document.getElementById('lockInput').focus();
}
}
window.checkPassword=checkPassword;
document.getElementById('lockInput').addEventListener('keydown',function(e){if(e.key==='Enter')checkPassword()});

function loadRecords(){
try{records=JSON.parse(localStorage.getItem(STORAGE_KEY)||'[]')}catch(e){records=[]}
renderRecords();
updateStats();
}

var TOOL_NAMES={yanxue:'厌学成因',parent:'家长心态',teen:'厌学程度',family:'家庭互动'};

function getRisk(r){var ms=r.maxScore||0;if(ms>=16)return'high';if(ms>=12)return'medium';return'low'}
function getRiskLabel(r){var ms=r.maxScore||0;if(ms>=16)return'🔴 高风险';if(ms>=12)return'🟡 中风险';return'🟢 正常'}

window.setFilter=function(f){
currentFilter=f;
document.querySelectorAll('.filter-btn').forEach(function(b){b.classList.remove('active')});
var idx=f==='all'?0:f==='yanxue'?1:f==='parent'?2:f==='teen'?3:4;
document.querySelectorAll('.filter-btn')[idx].classList.add('active');
renderRecords();
};

function renderRecords(){
var el=document.getElementById('recordList');
var filtered=currentFilter==='all'?records:records.filter(function(r){return(r.tool||'yanxue')===currentFilter});
if(filtered.length===0){
el.innerHTML='<div class="empty-state"><div class="icon">📭</div><p>暂无记录</p></div>';
return;
}
var html='';
filtered.forEach(function(r,i){
var risk=getRisk(r);
var tool=r.tool||'yanxue';
var toolName=TOOL_NAMES[tool]||tool;
var time=new Date(r.time).toLocaleString('zh-CN');
var scoresHtml='';
if(r.scores){
Object.keys(r.scores).forEach(function(dim){
var sc=r.scores[dim];
var scR=sc>=16?'s1':(sc>=12?'s2':'s3');
scoresHtml+='<span class="score-tag '+scR+'">'+dim+':'+sc+'</span>';
});
}
html+='<div class="record-card '+risk+'">';
html+='<div class="record-header"><div><div class="record-name">'+esc(r.name)+'</div><div class="record-phone">📞 '+esc(r.phone)+'</div></div></div>';
html+='<div class="record-meta"><div class="record-time">'+time+'</div><span class="record-tool t'+(tool==='yanxue'?1:tool==='parent'?2:tool==='teen'?3:4)+'">'+toolName+'</span><div>'+getRiskLabel(r)+'</div></div>';
if(scoresHtml)html+='<div class="record-scores">'+scoresHtml+'</div>';
if(r.note&&r.note!=='无')html+='<div class="record-note">📝 '+esc(r.note)+'</div>';
html+='<div class="record-actions"><button class="btn-sm" onclick="showDetail('+records.indexOf(r)+')">查看详情</button><button class="btn-sm red" onclick="deleteRecord('+records.indexOf(r)+')">删除</button></div></div>';
});
el.innerHTML=html;
}

function updateStats(){
var today=new Date().toDateString();
var todayCount=records.filter(function(r){return new Date(r.time).toDateString()===today}).length;
var high=records.filter(function(r){return getRisk(r)==='high'}).length;
var medium=records.filter(function(r){return getRisk(r)==='medium'}).length;
document.getElementById('statTotal').textContent=records.length;
document.getElementById('statHigh').textContent=high;
document.getElementById('statMedium').textContent=medium;
document.getElementById('statToday').textContent=todayCount;
}

window.showDetail=function(idx){
var r=records[idx];
if(!r)return;
var tool=r.tool||'yanxue';
var html='<div class="modal-section"><h4>基本信息</h4>';
html+='<div class="modal-row"><span class="lbl">姓名</span><span class="val">'+esc(r.name)+'</span></div>';
html+='<div class="modal-row"><span class="lbl">电话</span><span class="val">'+esc(r.phone)+'</span></div>';
html+='<div class="modal-row"><span class="lbl">工具</span><span class="val">'+(TOOL_NAMES[tool]||tool)+'</span></div>';
html+='<div class="modal-row"><span class="lbl">风险</span><span class="val '+getRisk(r)+'">'+getRiskLabel(r)+'</span></div></div>';
if(r.scores){
html+='<div class="modal-section"><h4>维度得分</h4>';
Object.keys(r.scores).forEach(function(dim){
var sc=r.scores[dim];
var scR=sc>=16?'high':(sc>=12?'medium':'low');
html+='<div class="modal-row"><span class="lbl">'+dim+'</span><span class="val '+scR+'">'+sc+'</span></div>';
});
html+='</div>';
}
if(r.note&&r.note!=='无'){
html+='<div class="modal-section"><h4>备注</h4><div style="background:#f9f9f9;padding:10px;border-radius:8px;font-size:12px">'+esc(r.note)+'</div></div>';
}
document.getElementById('detailContent').innerHTML=html;
document.getElementById('detailModal').classList.add('show');
};
window.closeDetail=function(){document.getElementById('detailModal').classList.remove('show')};

window.deleteRecord=function(idx){
if(!confirm('确定删除？'))return;
records.splice(idx,1);
localStorage.setItem(STORAGE_KEY,JSON.stringify(records));
renderRecords();
updateStats();
};
window.clearAll=function(){if(confirm('清空所有记录？')){if(confirm('确认清空？')){records=[];localStorage.setItem(STORAGE_KEY,'[]');renderRecords();updateStats()}}};

window.exportExcel=function(){
if(records.length===0){alert('暂无数据');return}
var wb=XLSX.utils.book_new();
var rows=[['时间','姓名','工具','分数','风险','备注']];
records.forEach(function(r){
var tool=r.tool||'yanxue';
rows.push([new Date(r.time).toLocaleString('zh-CN'),r.name||'',TOOL_NAMES[tool]||tool,r.maxScore||'',getRiskLabel(r),r.note||'']);
});
var ws=XLSX.utils.aoa_to_sheet(rows);
ws['!cols']=[{wch:20},{wch:12},{wch:12},{wch:8},{wch:12},{wch:30}];
XLSX.utils.book_append_sheet(wb,ws,'评估记录');
XLSX.writeFile(wb,'咨询师数据_'+new Date().toISOString().slice(0,10)+'.xlsx');
};

function esc(s){if(s===undefined||s===null)return'';return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')}

window.loadRecords=loadRecords;
})();
</script>

</body>
</html>
