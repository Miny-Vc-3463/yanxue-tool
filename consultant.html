<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<title>咨询师数据后台</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,"PingFang SC",sans-serif;background:#f5f6fa;min-height:100vh}
.lock-wrap{position:fixed;inset:0;background:linear-gradient(135deg,#667eea,#764ba2);display:flex;align-items:center;justify-content:center;z-index:9999}
.lock-box{background:#fff;border-radius:20px;padding:40px 32px;width:320px;max-width:90vw;text-align:center;box-shadow:0 20px 60px rgba(0,0,0,.3)}
.lock-icon{font-size:52px;margin-bottom:14px}
.lock-box h2{font-size:20px;color:#333;margin-bottom:6px}
.lock-box p{font-size:13px;color:#999;margin-bottom:22px}
.lock-input{width:100%;padding:13px 14px;border:2px solid #e0e0e0;border-radius:10px;font-size:15px;outline:none;margin-bottom:14px;-webkit-appearance:none}
.lock-input:focus{border-color:#667eea}
.lock-btn{width:100%;padding:14px;background:linear-gradient(135deg,#667eea,#764ba2);color:#fff;border:none;border-radius:10px;font-size:15px;font-weight:600;cursor:pointer}
.lock-err{display:none;color:#e74c3c;font-size:13px;margin-top:10px}
.main-wrap{display:none;max-width:800px;margin:0 auto;padding:20px}
.top-bar{background:linear-gradient(135deg,#667eea,#764ba2);color:#fff;padding:18px 20px;text-align:center;margin:-20px -20px 20px;font-size:18px;font-weight:600}
.card{background:#fff;border-radius:12px;padding:16px;margin-bottom:14px;box-shadow:0 2px 8px rgba(0,0,0,.08)}
.info-tip{background:#f0f4ff;border-left:4px solid #667eea;padding:12px;border-radius:0 8px 8px 0;font-size:12px;line-height:1.7;color:#555}
.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:14px}
.stat{background:#fff;border-radius:12px;padding:14px;text-align:center;box-shadow:0 2px 8px rgba(0,0,0,.08)}
.stat .n{font-size:26px;font-weight:700;color:#667eea}
.stat .l{font-size:11px;color:#999;margin-top:3px}
.btn-row{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:12px}
.btn{flex:1;min-width:70px;padding:11px 8px;border:none;border-radius:8px;font-size:13px;font-weight:600;cursor:pointer;color:#fff;min-height:44px}
.btn-blue{background:#667eea}
.btn-orange{background:#f39c12}
.btn-green{background:#27ae60}
.btn-excel{background:#1d6f42}
.btn-red{background:#e74c3c}
.filters{display:flex;gap:8px;overflow-x:auto;padding-bottom:6px;margin-bottom:12px}
.f-btn{padding:7px 14px;background:#e8e8e8;border:none;border-radius:20px;font-size:12px;cursor:pointer;white-space:nowrap}
.f-btn.on{background:#667eea;color:#fff}
.rec{background:#fff;border-radius:10px;padding:14px;margin-bottom:10px;border-left:4px solid #667eea;box-shadow:0 2px 6px rgba(0,0,0,.07)}
.rec.high{border-left-color:#e74c3c}
.rec.medium{border-left-color:#f39c12}
.rec.low{border-left-color:#27ae60}
.rec-name{font-weight:700;font-size:14px;color:#333}
.rec-phone{font-size:12px;color:#999;margin-top:2px}
.rec-meta{display:flex;gap:8px;flex-wrap:wrap;font-size:11px;color:#999;margin:8px 0}
.tag{padding:2px 8px;border-radius:4px;font-size:11px;font-weight:600;color:#fff}
.t1{background:#667eea}.t2{background:#27ae60}.t3{background:#f39c12}.t4{background:#764ba2}
.scores{display:flex;gap:5px;flex-wrap:wrap;margin:6px 0}
.sc{padding:3px 8px;border-radius:4px;font-size:11px}
.sc-h{background:#fde8e8;color:#e74c3c}
.sc-m{background:#fef9f0;color:#f39c12}
.sc-l{background:#e8f8f5;color:#27ae60}
.rec-note{font-size:12px;color:#666;background:#f9f9f9;padding:8px;border-radius:6px;margin:6px 0}
.rec-acts{display:flex;gap:8px;margin-top:10px}
.sm-btn{flex:1;padding:8px;border:none;border-radius:6px;font-size:12px;cursor:pointer;color:#fff;background:#667eea;min-height:36px}
.sm-btn.del{background:#e74c3c}
.empty{text-align:center;padding:40px 20px;color:#bbb}
.empty-icon{font-size:48px;margin-bottom:10px}
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.5);display:none;align-items:center;justify-content:center;z-index:8888;padding:20px}
.modal-bg.on{display:flex}
.modal{background:#fff;border-radius:14px;width:100%;max-width:480px;max-height:85vh;overflow-y:auto}
.modal-head{background:linear-gradient(135deg,#667eea,#764ba2);color:#fff;padding:16px 20px;border-radius:14px 14px 0 0;display:flex;justify-content:space-between;align-items:center}
.modal-head h3{font-size:16px;margin:0}
.close-btn{background:none;border:none;color:#fff;font-size:26px;cursor:pointer;line-height:1;padding:0}
.modal-body{padding:18px}
.m-row{display:flex;justify-content:space-between;padding:9px 0;border-bottom:1px solid #f0f0f0;font-size:13px}
.m-row:last-child{border:none}
.m-lbl{color:#999;font-weight:600}
.m-val{color:#333;font-weight:600}
.m-val.high{color:#e74c3c}
.m-val.medium{color:#f39c12}
.m-val.low{color:#27ae60}
.toast{position:fixed;bottom:60px;left:50%;transform:translateX(-50%);background:rgba(0,0,0,.8);color:#fff;padding:9px 22px;border-radius:22px;font-size:13px;z-index:99999;opacity:0;transition:opacity .3s;pointer-events:none;white-space:nowrap}
.toast.on{opacity:1}
@media(max-width:500px){.stats{grid-template-columns:repeat(2,1fr)}.btn-row{flex-direction:column}.btn{width:100%}}
</style>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
</head>
<body>

<div class="lock-wrap" id="lockWrap">
  <div class="lock-box">
    <div class="lock-icon">🔐</div>
    <h2>咨询师后台</h2>
    <p>请输入访问密码</p>
    <input class="lock-input" type="password" id="pwdInput" placeholder="请输入密码" maxlength="30" autocomplete="off">
    <button class="lock-btn" id="loginBtn">进入后台</button>
    <div class="lock-err" id="pwdErr">密码错误，请重试</div>
  </div>
</div>

<div class="main-wrap" id="mainWrap">
  <div class="top-bar">🔐 咨询师数据后台</div>

  <div class="card">
    <div class="info-tip">
      ✅ <strong>自动接收：</strong>评估工具提交的数据会自动显示在此页面<br>
      📱 <strong>微信导出：</strong>点击"📋 复制"将数据复制后发给同事<br>
      📥 <strong>数据导入：</strong>点击"📥 粘贴"从剪贴板导入数据
    </div>
  </div>

  <div class="stats">
    <div class="stat"><div class="n" id="sTotal">0</div><div class="l">总记录</div></div>
    <div class="stat"><div class="n" id="sHigh">0</div><div class="l">高风险</div></div>
    <div class="stat"><div class="n" id="sMed">0</div><div class="l">中风险</div></div>
    <div class="stat"><div class="n" id="sToday">0</div><div class="l">今日新增</div></div>
  </div>

  <div class="card">
    <div class="btn-row">
      <button class="btn btn-blue" id="btnRefresh">🔄 刷新</button>
      <button class="btn btn-orange" id="btnCopy">📋 复制</button>
      <button class="btn btn-green" id="btnPaste">📥 粘贴</button>
      <button class="btn btn-excel" id="btnExcel">📊 Excel</button>
      <button class="btn btn-red" id="btnClear">🗑️ 清空</button>
    </div>
    <div class="filters" id="filters">
      <button class="f-btn on" data-f="all">全部</button>
      <button class="f-btn" data-f="yanxue">厌学成因</button>
      <button class="f-btn" data-f="parent">家长心态</button>
      <button class="f-btn" data-f="teen">厌学程度</button>
      <button class="f-btn" data-f="family">家庭互动</button>
    </div>
  </div>

  <div class="card">
    <div style="font-size:15px;font-weight:600;color:#333;margin-bottom:12px">📋 评估记录</div>
    <div id="recList"><div class="empty"><div class="empty-icon">📭</div><p>暂无评估记录</p></div></div>
  </div>
</div>

<div class="modal-bg" id="detailBg">
  <div class="modal">
    <div class="modal-head">
      <h3>📊 评估详情</h3>
      <button class="close-btn" id="closeDetail">×</button>
    </div>
    <div class="modal-body" id="detailBody"></div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
var SK = 'yanxue_records';
var PK = 'yanxue_consultant_pwd';
var DP = 'yanxue2024';
var recs = [];
var curF = 'all';
var TN = {yanxue:'厌学成因',parent:'家长心态',teen:'厌学程度',family:'家庭互动'};

function risk(r){var s=r.maxScore||0;return s>=16?'high':s>=12?'medium':'low'}
function riskLbl(r){var s=r.maxScore||0;return s>=16?'🔴 高风险':s>=12?'🟡 中风险':'🟢 正常'}
function esc(s){return s==null?'':String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')}
function toast(m){var t=document.getElementById('toast');t.textContent=m;t.classList.add('on');setTimeout(function(){t.classList.remove('on')},2500)}

function doLogin(){
  var v=document.getElementById('pwdInput').value.trim();
  var p=localStorage.getItem(PK)||DP;
  if(v===p){
    document.getElementById('lockWrap').style.display='none';
    document.getElementById('mainWrap').style.display='block';
    loadRecs();
  } else {
    document.getElementById('pwdErr').style.display='block';
    document.getElementById('pwdInput').value='';
    document.getElementById('pwdInput').focus();
  }
}

function loadRecs(){
  try{recs=JSON.parse(localStorage.getItem(SK)||'[]')}catch(e){recs=[]}
  render();stats();
}

function render(){
  var el=document.getElementById('recList');
  var list=curF==='all'?recs:recs.filter(function(r){return(r.tool||'yanxue')===curF});
  if(!list.length){el.innerHTML='<div class="empty"><div class="empty-icon">📭</div><p>暂无记录</p></div>';return}
  var h='';
  list.forEach(function(r){
    var ri=risk(r);var tool=r.tool||'yanxue';var tn=TN[tool]||tool;
    var ti=tool==='yanxue'?1:tool==='parent'?2:tool==='teen'?3:4;
    var tm=new Date(r.time).toLocaleString('zh-CN');
    var sc='';
    if(r.scores)Object.keys(r.scores).forEach(function(k){var v=r.scores[k];sc+='<span class="sc '+(v>=16?'sc-h':v>=12?'sc-m':'sc-l')+'">'+k+':'+v+'</span>'});
    var idx=recs.indexOf(r);
    h+='<div class="rec '+ri+'">';
    h+='<div class="rec-name">'+esc(r.name)+'</div>';
    h+='<div class="rec-phone">📞 '+esc(r.phone)+'</div>';
    h+='<div class="rec-meta"><span>'+tm+'</span><span class="tag t'+ti+'">'+tn+'</span><span>'+riskLbl(r)+'</span></div>';
    if(sc)h+='<div class="scores">'+sc+'</div>';
    if(r.note&&r.note!=='无')h+='<div class="rec-note">📝 '+esc(r.note)+'</div>';
    h+='<div class="rec-acts"><button class="sm-btn" onclick="detail('+idx+')">查看详情</button><button class="sm-btn del" onclick="del('+idx+')">删除</button></div>';
    h+='</div>';
  });
  el.innerHTML=h;
}

function stats(){
  var today=new Date().toDateString();
  document.getElementById('sTotal').textContent=recs.length;
  document.getElementById('sHigh').textContent=recs.filter(function(r){return risk(r)==='high'}).length;
  document.getElementById('sMed').textContent=recs.filter(function(r){return risk(r)==='medium'}).length;
  document.getElementById('sToday').textContent=recs.filter(function(r){return new Date(r.time).toDateString()===today}).length;
}

window.detail=function(i){
  var r=recs[i];if(!r)return;
  var tool=r.tool||'yanxue';
  var h='<div style="margin-bottom:14px"><div class="m-row"><span class="m-lbl">姓名</span><span class="m-val">'+esc(r.name)+'</span></div>';
  h+='<div class="m-row"><span class="m-lbl">电话</span><span class="m-val">'+esc(r.phone)+'</span></div>';
  h+='<div class="m-row"><span class="m-lbl">工具</span><span class="m-val">'+(TN[tool]||tool)+'</span></div>';
  h+='<div class="m-row"><span class="m-lbl">风险</span><span class="m-val '+risk(r)+'">'+riskLbl(r)+'</span></div></div>';
  if(r.scores){
    h+='<div style="font-weight:600;font-size:13px;margin-bottom:8px">维度得分</div>';
    Object.keys(r.scores).forEach(function(k){var v=r.scores[k];h+='<div class="m-row"><span class="m-lbl">'+k+'</span><span class="m-val '+(v>=16?'high':v>=12?'medium':'low')+'">'+v+'</span></div>'});
  }
  if(r.note&&r.note!=='无')h+='<div style="margin-top:12px;font-size:12px;background:#f9f9f9;padding:10px;border-radius:8px">📝 '+esc(r.note)+'</div>';
  document.getElementById('detailBody').innerHTML=h;
  document.getElementById('detailBg').classList.add('on');
};

window.del=function(i){
  if(!confirm('确定删除？'))return;
  recs.splice(i,1);
  localStorage.setItem(SK,JSON.stringify(recs));
  render();stats();
};

function doCopy(){
  if(!recs.length){alert('暂无数据');return}
  var lines=['【咨询师后台数据】','='.repeat(28),''];
  recs.forEach(function(r,i){
    var t=r.tool||'yanxue';
    lines.push('['+(i+1)+'] '+r.name+' | '+r.phone+' | '+TN[t]+' | 分:'+(r.maxScore||''));
    if(r.scores){var sc=[];Object.keys(r.scores).forEach(function(k){sc.push(k+':'+r.scores[k])});lines.push('  维度:'+sc.join(' | '))}
    if(r.note&&r.note!=='无')lines.push('  备注:'+r.note);
    lines.push('-'.repeat(28));
  });
  var txt=lines.join('\n');
  if(navigator.clipboard&&navigator.clipboard.writeText){
    navigator.clipboard.writeText(txt).then(function(){toast('✓ 已复制到剪贴板')}).catch(function(){prompt('手动复制:',txt)});
  } else {
    var ta=document.createElement('textarea');ta.value=txt;ta.style.cssText='position:fixed;top:0;left:-9999px';
    document.body.appendChild(ta);ta.select();
    try{document.execCommand('copy');toast('✓ 已复制')}catch(e){prompt('复制:',txt)}
    document.body.removeChild(ta);
  }
}

function doPaste(){
  var txt=prompt('请粘贴从评估工具复制的报告内容：');
  if(!txt||!txt.trim())return;
  try{
    var data=JSON.parse(txt);
    if(!data.tool){alert('格式不正确');return}
    var found=false;
    for(var i=0;i<recs.length;i++){
      if(recs[i].tool===data.tool&&recs[i].name===data.name&&Math.abs(new Date(recs[i].time)-new Date(data.time))<86400000){recs[i]=data;found=true;break}
    }
    if(!found)recs.push(data);
    localStorage.setItem(SK,JSON.stringify(recs));
    render();stats();toast('✓ 已导入 '+recs.length+' 条记录');
  }catch(e){alert('解析失败，请确保粘贴的是完整报告内容')}
}

function doExcel(){
  if(!recs.length){alert('暂无数据');return}
  var wb=XLSX.utils.book_new();
  var rows=[['时间','姓名','工具','分数','风险','备注']];
  recs.forEach(function(r){rows.push([new Date(r.time).toLocaleString('zh-CN'),r.name||'',TN[r.tool||'yanxue']||r.tool,r.maxScore||'',riskLbl(r),r.note||''])});
  var ws=XLSX.utils.aoa_to_sheet(rows);
  ws['!cols']=[{wch:20},{wch:12},{wch:12},{wch:8},{wch:12},{wch:30}];
  XLSX.utils.book_append_sheet(wb,ws,'评估记录');
  XLSX.writeFile(wb,'咨询师数据_'+new Date().toISOString().slice(0,10)+'.xlsx');
}

function doClear(){
  if(!confirm('清空所有记录？'))return;
  if(!confirm('确认清空？不可恢复！'))return;
  recs=[];localStorage.setItem(SK,'[]');render();stats();toast('已清空');
}

// ── 绑定所有事件 ──
document.getElementById('loginBtn').onclick = doLogin;
document.getElementById('pwdInput').onkeydown = function(e){if(e.key==='Enter')doLogin()};
document.getElementById('btnRefresh').onclick = loadRecs;
document.getElementById('btnCopy').onclick = doCopy;
document.getElementById('btnPaste').onclick = doPaste;
document.getElementById('btnExcel').onclick = doExcel;
document.getElementById('btnClear').onclick = doClear;
document.getElementById('closeDetail').onclick = function(){document.getElementById('detailBg').classList.remove('on')};

document.getElementById('filters').onclick = function(e){
  var btn=e.target.closest('.f-btn');
  if(!btn)return;
  document.querySelectorAll('.f-btn').forEach(function(b){b.classList.remove('on')});
  btn.classList.add('on');
  curF=btn.getAttribute('data-f');
  render();
};
</script>
</body>
</html>
